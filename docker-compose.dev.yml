services:
  frontend:
    build:
      target: builder
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development

  backend:
    command: npx tsx watch src/index.ts
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development

  worker:
    command: npx tsx watch src/worker/index.ts
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
